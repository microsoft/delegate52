<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="black" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <!-- Document -->
  <path d="M5 2h10l4 4v16H5z"/>
  <path d="M15 2v4h4"/>
  <!-- Lines on doc -->
  <line x1="8" y1="9" x2="16" y2="9" stroke-width="1" stroke-opacity="0.4"/>
  <line x1="8" y1="17" x2="16" y2="17" stroke-width="1" stroke-opacity="0.4"/>
  <line x1="8" y1="19" x2="14" y2="19" stroke-width="1" stroke-opacity="0.4"/>
  <!-- Ribbon banner across middle -->
  <rect x="3" y="9" width="18" height="9" fill="#0A0A0A" stroke="black"/>
  <!-- LEAN with ∃ (flipped E) and ∀ (flipped A) -->
  <!-- L -->
  <path d="M5 11.5v4h1.8" stroke="white" stroke-width="1.6" fill="none"/>
  <!-- ∃ (flipped E = "there exists") -->
  <path d="M10.5 11.5H8.5v2H10M8.5 13.5v2H10.5" stroke="white" stroke-width="1.6" fill="none"/>
  <!-- ∀ (inverted A = "for all") -->
  <path d="M12 15.5l1.5-4 1.5 4M12.7 14h1.6" stroke="white" stroke-width="1.6" fill="none"/>
  <!-- N -->
  <path d="M16.5 15.5v-4l2.2 4v-4" stroke="white" stroke-width="1.6" fill="none"/>
</svg>
