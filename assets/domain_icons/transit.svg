<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="black" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <!-- Train body - slightly larger -->
  <rect x="5" y="3" width="14" height="14" rx="3"/>
  <!-- Window divider -->
  <line x1="5" y1="11" x2="19" y2="11"/>
  <!-- Headlights / windows -->
  <circle cx="8.5" cy="14" r="1" fill="black"/>
  <circle cx="15.5" cy="14" r="1" fill="black"/>
  <!-- Destination sign -->
  <line x1="9" y1="7" x2="15" y2="7"/>
  <!-- Wheels / rails -->
  <line x1="8" y1="17" x2="5.5" y2="20.5"/>
  <line x1="16" y1="17" x2="18.5" y2="20.5"/>
  <!-- Rail -->
  <line x1="4" y1="21" x2="20" y2="21" stroke-width="1.5"/>
</svg>
