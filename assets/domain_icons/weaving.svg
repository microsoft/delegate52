<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="black" stroke-linecap="round" stroke-linejoin="round">
  <!-- Base grid (dim under-threads) -->
  <line x1="6" y1="2" x2="6" y2="22" stroke-width="1.5" stroke-opacity="0.3"/>
  <line x1="12" y1="2" x2="12" y2="22" stroke-width="1.5" stroke-opacity="0.3"/>
  <line x1="18" y1="2" x2="18" y2="22" stroke-width="1.5" stroke-opacity="0.3"/>
  <line x1="2" y1="6" x2="22" y2="6" stroke-width="1.5" stroke-opacity="0.3"/>
  <line x1="2" y1="12" x2="22" y2="12" stroke-width="1.5" stroke-opacity="0.3"/>
  <line x1="2" y1="18" x2="22" y2="18" stroke-width="1.5" stroke-opacity="0.3"/>
  <!-- Vertical over-segments (checkerboard) -->
  <line x1="6" y1="4" x2="6" y2="8" stroke-width="2.5"/>
  <line x1="18" y1="4" x2="18" y2="8" stroke-width="2.5"/>
