<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="black" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <!-- Hanging strings from top -->
  <line x1="8" y1="1" x2="8" y2="4"/>
  <line x1="16" y1="1" x2="16" y2="4"/>
  <!-- Pin dots at top of strings -->
  <circle cx="8" cy="1" r="0.8" fill="black" stroke="none"/>
  <circle cx="16" cy="1" r="0.8" fill="black" stroke="none"/>
  <!-- Wooden board -->
  <rect x="4" y="4" width="16" height="12" rx="1"/>
  <!-- Wood grain lines -->
  <line x1="4" y1="7" x2="20" y2="7" stroke-width="0.5" stroke-opacity="0.4"/>
  <line x1="4" y1="13" x2="20" y2="13" stroke-width="0.5" stroke-opacity="0.4"/>
  <!-- JOB text -->
  <text x="12" y="12.5" font-size="5.5" fill="black" stroke="none" font-family="sans-serif" font-weight="bold" text-anchor="middle">JOB</text>
  <!-- Magnifying glass bottom-right -->
  <circle cx="18" cy="19" r="2.5" stroke-width="1.5"/>
  <line x1="20" y1="21" x2="22.5" y2="23.5" stroke-width="1.5"/>
</svg>
